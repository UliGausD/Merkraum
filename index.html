<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merkraum - Deine persönlichen Pinnwände</title>
    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel für die Live-Ausführung im Browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons Bibliothek -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8f9fa;
        }
        /* Custom Scrollbar für den Pinnwand-Look */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #dcd2c1; border-radius: 10px; }
        
        /* Animationen */
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Robuste Icon-Komponente für die Browser-Nutzung ohne Imports
        const Icon = ({ name, size = 18, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const icon = lucide.icons[name];
                if (icon && Array.isArray(icon[2])) {
                    const svgString = icon[2].map(tag => {
                        const tagName = tag[0];
                        const attributes = tag[1] || {};
                        const attrString = Object.entries(attributes)
                            .map(([k, v]) => `${k}="${v}"`)
                            .join(' ');
                        return `<${tagName} ${attrString} />`;
                    }).join('');
                    setSvg(svgString);
                }
            }, [name]);
            
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                    dangerouslySetInnerHTML={{ __html: svg }}
                />
            );
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        const App = () => {
            const [boards, setBoards] = useState([]);
            const [activeBoardId, setActiveBoardId] = useState('home');
            const [searchQuery, setSearchQuery] = useState('');
            const [isBoardModalOpen, setIsBoardModalOpen] = useState(false);
            const [isEntryModalOpen, setIsEntryModalOpen] = useState(false);
            const [editingEntry, setEditingEntry] = useState(null);
            const [editingBoard, setEditingBoard] = useState(null);
            const [entryTargetBoardId, setEntryTargetBoardId] = useState(null);
            const [deleteConfirm, setDeleteConfirm] = useState({ show: false, type: null, id: null, boardId: null });

            // Daten aus LocalStorage laden
            useEffect(() => {
                const saved = localStorage.getItem('merkraum_data');
                if (saved) {
                    try { setBoards(JSON.parse(saved)); } catch (e) { setBoards([]); }
                }
            }, []);

            // Daten automatisch speichern
            useEffect(() => {
                localStorage.setItem('merkraum_data', JSON.stringify(boards));
            }, [boards]);

            const addOrUpdateBoard = (name) => {
                if (editingBoard) {
                    setBoards(boards.map(b => b.id === editingBoard.id ? { ...b, name } : b));
                } else {
                    const newBoard = { id: generateId(), name, entries: [], createdAt: new Date().toISOString() };
                    setBoards([...boards, newBoard]);
                }
                setIsBoardModalOpen(false);
                setEditingBoard(null);
            };

            const deleteBoard = (id) => {
                setBoards(boards.filter(b => b.id !== id));
                if (activeBoardId === id) setActiveBoardId('home');
                setDeleteConfirm({ show: false, type: null, id: null });
            };

            const addOrUpdateEntry = (entryData) => {
                const targetId = entryTargetBoardId || activeBoardId;
                const updatedBoards = boards.map(board => {
                    if (board.id === targetId) {
                        if (editingEntry) {
                            return { ...board, entries: board.entries.map(e => e.id === editingEntry.id ? { ...entryData, id: e.id } : e) };
                        } else {
                            return { ...board, entries: [...board.entries, { ...entryData, id: generateId(), createdAt: new Date().toISOString() }] };
                        }
                    }
                    return board;
                });
                setBoards(updatedBoards);
                setIsEntryModalOpen(false);
                setEditingEntry(null);
                setEntryTargetBoardId(null);
            };

            const deleteEntry = (entryId, boardId) => {
                setBoards(boards.map(board => {
                    if (board.id === boardId) return { ...board, entries: board.entries.filter(e => e.id !== entryId) };
                    return board;
                }));
                setDeleteConfirm({ show: false, type: null, id: null });
            };

            const allEntries = boards.flatMap(b => b.entries.map(e => ({ ...e, boardName: b.name, boardId: b.id })));
            const filteredEntries = searchQuery 
                ? allEntries.filter(e => e.title.toLowerCase().includes(searchQuery.toLowerCase()) || e.content.toLowerCase().includes(searchQuery.toLowerCase()))
                : [];

            const activeBoard = boards.find(b => b.id === activeBoardId);

            return (
                <div className="min-h-screen flex text-slate-900">
                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col fixed h-full border-r border-slate-800 z-20">
                        <div className="p-6 flex items-center gap-2 text-white font-bold text-xl">
                            <Icon name="Pin" className="text-indigo-400 rotate-12" size={24} />
                            Merkraum
                        </div>
                        <nav className="flex-1 px-4 space-y-1 overflow-y-auto custom-scrollbar">
                            <button onClick={() => setActiveBoardId('home')} className={`w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2 transition-all ${activeBoardId === 'home' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}>
                                <Icon name="Grid" size={16} /> Alle Pinnwände
                            </button>
                            <div className="pt-6 pb-2 px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Deine Räume</div>
                            {boards.map(board => (
                                <div key={board.id} className="group flex items-center">
                                    <button onClick={() => setActiveBoardId(board.id)} className={`flex-1 text-left px-3 py-2 rounded-lg text-sm truncate ${activeBoardId === board.id ? 'bg-slate-800 text-indigo-400' : 'hover:bg-slate-800/50'}`}>
                                        {board.name}
                                    </button>
                                    <button onClick={(e) => { e.stopPropagation(); setEditingBoard(board); setIsBoardModalOpen(true); }} className="opacity-0 group-hover:opacity-100 p-1.5 text-slate-500 hover:text-indigo-400 transition-all">
                                        <Icon name="Edit3" size={14} />
                                    </button>
                                </div>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-slate-800">
                            <button onClick={() => { setEditingBoard(null); setIsBoardModalOpen(true); }} className="w-full py-2.5 bg-slate-800 rounded-xl text-sm font-medium hover:bg-slate-700 flex items-center justify-center gap-2 transition-all text-white border border-slate-700">
                                <Icon name="Plus" size={16} /> Neue Pinnwand
                            </button>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="ml-64 p-8 w-full">
                        <div className="max-w-7xl mx-auto">
                            {/* Search Header */}
                            <div className="mb-10 relative max-w-md">
                                <Icon name="Search" className="absolute left-3 top-3 text-slate-400" size={18} />
                                <input type="text" placeholder="Einträge suchen..." className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>

                            {searchQuery ? (
                                <div className="animate-fade-in">
                                    <h2 className="text-2xl font-bold mb-6 text-slate-800">Suchergebnisse: "{searchQuery}"</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {filteredEntries.map(e => <EntryCard key={e.id} entry={e} onEdit={() => { setEntryTargetBoardId(e.boardId); setEditingEntry(e); setIsEntryModalOpen(true); }} />)}
                                        {filteredEntries.length === 0 && <p className="text-slate-400 italic">Keine Treffer gefunden.</p>}
                                    </div>
                                </div>
                            ) : activeBoardId === 'home' ? (
                                <div className="animate-fade-in">
                                    <h2 className="text-3xl font-bold mb-8 text-slate-900">Deine Pinnwände</h2>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        {boards.map(b => (
                                            <BoardCard 
                                                key={b.id} 
                                                board={b} 
                                                onOpen={() => setActiveBoardId(b.id)} 
                                                onEdit={() => { setEditingBoard(b); setIsBoardModalOpen(true); }} 
                                                onDelete={() => setDeleteConfirm({ show: true, type: 'board', id: b.id })} 
                                                onAddEntry={() => { setEntryTargetBoardId(b.id); setIsEntryModalOpen(true); }} 
                                            />
                                        ))}
                                        {boards.length === 0 && (
                                            <div className="col-span-full py-20 text-center border-2 border-dashed border-slate-200 rounded-3xl bg-white/50">
                                                <p className="text-slate-400">Nutze "Neue Pinnwand" in der Sidebar, um zu starten.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <div className="animate-fade-in">
                                    <div className="flex flex-col mb-8">
                                        <button onClick={() => setActiveBoardId('home')} className="flex items-center gap-1 text-slate-400 hover:text-indigo-600 text-sm mb-2 font-medium transition-colors">
                                            <Icon name="ChevronLeft" size={16} /> Zurück zur Übersicht
                                        </button>
                                        <div className="flex justify-between items-end">
                                            <div className="flex items-center gap-3">
                                                <h2 className="text-4xl font-bold text-slate-900">{activeBoard?.name}</h2>
                                                <button onClick={() => { setEditingBoard(activeBoard); setIsBoardModalOpen(true); }} className="p-2 text-slate-300 hover:text-indigo-600 transition-colors">
                                                    <Icon name="Edit3" size={20} />
                                                </button>
                                            </div>
                                            <button onClick={() => { setEntryTargetBoardId(activeBoardId); setEditingEntry(null); setIsEntryModalOpen(true); }} className="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 flex items-center gap-2 transition-all">
                                                <Icon name="Plus" size={20} /> Neuer Eintrag
                                            </button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {activeBoard?.entries.map(e => (
                                            <EntryCard 
                                                key={e.id} 
                                                entry={e} 
                                                onEdit={() => { setEntryTargetBoardId(activeBoardId); setEditingEntry(e); setIsEntryModalOpen(true); }} 
                                                onDelete={() => setDeleteConfirm({ show: true, type: 'entry', id: e.id, boardId: activeBoardId })} 
                                            />
                                        ))}
                                        {activeBoard?.entries.length === 0 && (
                                            <div className="col-span-full py-20 text-center border-2 border-dashed border-slate-100 rounded-3xl">
                                                <p className="text-slate-400 italic">Noch keine Einträge vorhanden.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modals */}
                    {isBoardModalOpen && (
                        <Modal title={editingBoard ? "Pinnwand bearbeiten" : "Neue Pinnwand"} onClose={() => { setIsBoardModalOpen(false); setEditingBoard(null); }}>
                            <BoardForm initialName={editingBoard?.name} onSubmit={addOrUpdateBoard} />
                        </Modal>
                    )}
                    {isEntryModalOpen && (
                        <Modal title={editingEntry ? "Eintrag bearbeiten" : "Neuer Eintrag"} onClose={() => { setIsEntryModalOpen(false); setEditingEntry(null); }}>
                            <EntryForm initialData={editingEntry} onSubmit={addOrUpdateEntry} />
                        </Modal>
                    )}
                    {deleteConfirm.show && (
                        <DeleteModal 
                            onCancel={() => setDeleteConfirm({ show: false })} 
                            onConfirm={() => deleteConfirm.type === 'board' ? deleteBoard(deleteConfirm.id) : deleteEntry(deleteConfirm.id, deleteConfirm.boardId)} 
                        />
                    )}
                </div>
            );
        };

        const BoardCard = ({ board, onOpen, onEdit, onDelete, onAddEntry }) => (
            <div className="bg-[#ebe4d8] rounded-3xl border-4 border-[#dcd2c1] shadow-lg flex flex-col h-[480px] overflow-hidden group">
                <div className="p-5 bg-[#e3dbc9] border-b border-[#dcd2c1] flex justify-between items-center">
                    <div className="flex items-center gap-3 font-bold text-slate-800 cursor-pointer hover:text-indigo-700 transition-colors" onClick={onOpen}>
                        <div className="w-2.5 h-2.5 rounded-full bg-red-400 shadow-sm"></div>
                        <span className="truncate max-w-[180px]">{board.name}</span>
                    </div>
                    <div className="flex gap-1">
                        <button onClick={onEdit} className="p-2 hover:bg-white/50 rounded-lg transition-colors"><Icon name="Edit3" size={16}/></button>
                        <button onClick={onAddEntry} className="p-2 hover:bg-white/50 rounded-lg transition-colors"><Icon name="Plus" size={16}/></button>
                        <button onClick={onDelete} className="p-2 hover:bg-red-100 text-red-500 rounded-lg transition-colors"><Icon name="Trash2" size={16}/></button>
                    </div>
                </div>
                <div className="p-5 flex-1 overflow-y-auto grid grid-cols-2 gap-4 custom-scrollbar">
                    {board.entries.map((e, i) => (
                        <div 
                            key={e.id} 
                            className={`bg-white p-3 rounded-lg shadow-sm border border-slate-200/50 text-[10px] transform transition-all hover:scale-105 rotate-${i % 2 === 0 ? '1' : '-1'} h-fit relative`}
                        >
                            <div className="w-1 h-1 bg-indigo-300 rounded-full absolute top-1 left-1/2 -translate-x-1/2 opacity-30"></div>
                            {e.image && <img src={e.image} className="w-full h-16 object-cover mb-2 rounded border border-slate-50" />}
                            <div className="font-bold text-slate-800 truncate mb-1">{e.title}</div>
                            <div className="text-slate-500 line-clamp-2 leading-tight">{e.content}</div>
                        </div>
                    ))}
                    {board.entries.length === 0 && <div className="col-span-2 text-center py-20 text-slate-400/30 italic text-xs">Keine Einträge</div>}
                </div>
                <button onClick={onOpen} className="py-3 bg-black/5 text-[11px] font-bold uppercase tracking-[0.2em] text-slate-600 hover:bg-black/10 transition-all">
                    Pinnwand öffnen ({board.entries.length})
                </button>
            </div>
        );

        const EntryCard = ({ entry, onEdit, onDelete }) => (
            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden group hover:shadow-xl transition-all relative flex flex-col h-full">
                <div className="absolute top-2 left-1/2 -translate-x-1/2 w-3 h-3 bg-indigo-500/10 rounded-full z-10"></div>
                {entry.image && <img src={entry.image} className="w-full h-40 object-cover border-b border-slate-50 transition-transform group-hover:scale-105" />}
                <div className="p-5 flex-1 flex flex-col">
                    <h3 className="font-bold text-slate-800 mb-2 text-lg leading-tight">{entry.title}</h3>
                    <p className="text-sm text-slate-500 line-clamp-4 mb-4 whitespace-pre-wrap flex-1 leading-relaxed">{entry.content}</p>
                    
                    {entry.note && (
                        <div className="text-[10px] bg-slate-50 p-2.5 rounded-xl text-slate-400 italic mb-4 border border-slate-100">
                            {entry.note}
                        </div>
                    )}
                    
                    <div className="mt-auto flex justify-between items-center border-t border-slate-50 pt-4">
                        {entry.link ? (
                            <a href={entry.link} target="_blank" rel="noopener noreferrer" className="text-[10px] text-indigo-600 font-bold uppercase tracking-wider flex items-center gap-1 hover:underline">
                                <Icon name="ExternalLink" size={10} /> Link
                            </a>
                        ) : <div />}
                        <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                            <button onClick={onEdit} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl"><Icon name="Edit3" size={16}/></button>
                            {onDelete && <button onClick={onDelete} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl"><Icon name="Trash2" size={16}/></button>}
                        </div>
                    </div>
                </div>
            </div>
        );

        const Modal = ({ title, onClose, children }) => (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-xl overflow-hidden animate-fade-in flex flex-col max-h-[90vh]">
                    <div className="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                        <h3 className="font-bold text-2xl text-slate-800 tracking-tight">{title}</h3>
                        <button onClick={onClose} className="p-2 hover:bg-white rounded-full transition-colors text-slate-400 hover:text-slate-900"><Icon name="X" size={24} /></button>
                    </div>
                    <div className="p-8 overflow-y-auto custom-scrollbar flex-1">{children}</div>
                </div>
            </div>
        );

        const BoardForm = ({ initialName, onSubmit }) => {
            const [val, setVal] = useState(initialName || '');
            return (
                <form onSubmit={e => { e.preventDefault(); if(val.trim()) onSubmit(val); }} className="space-y-6">
                    <div>
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Name der Pinnwand</label>
                        <input 
                            autoFocus 
                            className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 font-bold text-lg transition-all" 
                            value={val} 
                            onChange={e => setVal(e.target.value)} 
                            placeholder="z.B. Ideen, Projekte..." 
                        />
                    </div>
                    <button className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl shadow-indigo-100 transition-all active:scale-95 hover:bg-indigo-700 flex items-center justify-center gap-2">
                        <Icon name="Save" size={20} /> Speichern
                    </button>
                </form>
            );
        };

        const EntryForm = ({ initialData, onSubmit }) => {
            const [data, setData] = useState(initialData || { title: '', content: '', note: '', link: '', image: null });
            const fileRef = useRef();

            const onFile = e => {
                const f = e.target.files[0];
                if (f) {
                    const r = new FileReader();
                    r.onload = () => setData({...data, image: r.result});
                    r.readAsDataURL(f);
                }
            };

            const onPaste = e => {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        const blob = items[i].getAsFile();
                        const r = new FileReader();
                        r.onload = (event) => setData({...data, image: event.target.result});
                        r.readAsDataURL(blob);
                    }
                }
            };

            return (
                <form onPaste={onPaste} onSubmit={e => { e.preventDefault(); if(data.title.trim()) onSubmit(data); }} className="space-y-6">
                    <div className="space-y-4">
                        <div>
                            <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Titel</label>
                            <input required className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 font-bold" value={data.title} onChange={e => setData({...data, title: e.target.value})} placeholder="Titel des Eintrags" />
                        </div>
                        <div>
                            <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Inhalt</label>
                            <textarea className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 min-h-[120px]" value={data.content} onChange={e => setData({...data, content: e.target.value})} placeholder="Deine Notizen..."></textarea>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Notiz</label>
                                <input className="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm" value={data.note} onChange={e => setData({...data, note: e.target.value})} placeholder="Tag oder Info" />
                            </div>
                            <div>
                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Link</label>
                                <input type="url" className="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm" value={data.link} onChange={e => setData({...data, link: e.target.value})} placeholder="https://..." />
                            </div>
                        </div>
                        <div>
                            <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Bildanhang</label>
                            <div className="flex gap-5 items-center">
                                <div onClick={() => fileRef.current.click()} className="w-24 h-24 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-indigo-50 hover:border-indigo-300 transition-all shrink-0 overflow-hidden">
                                    {data.image ? <img src={data.image} className="w-full h-full object-cover" /> : <Icon name="Image" className="text-slate-300" size={32} />}
                                </div>
                                <input type="file" ref={fileRef} className="hidden" onChange={onFile} accept="image/*" />
                                <div className="p-4 bg-amber-50 rounded-2xl border border-amber-100 flex-1">
                                    <p className="text-[11px] text-amber-700 leading-relaxed font-medium">
                                        Tipp: Bild auswählen oder einfach per <strong>Strg + V</strong> einfügen!
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold transition-all active:scale-95 shadow-xl shadow-indigo-100 hover:bg-indigo-700 flex items-center justify-center gap-2">
                        <Icon name="Pin" size={20} /> Anheften
                    </button>
                </form>
            );
        };

        const DeleteModal = ({ onCancel, onConfirm }) => (
            <div className="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                <div className="bg-white p-10 rounded-[2.5rem] max-w-sm w-full text-center shadow-2xl animate-fade-in">
                    <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="Trash2" size={32}/></div>
                    <h3 className="font-bold text-2xl mb-2 text-slate-900 tracking-tight">Sicher?</h3>
                    <p className="text-slate-500 text-sm mb-8 leading-relaxed">Dies kann nicht rückgängig gemacht werden.</p>
                    <div className="flex gap-3">
                        <button onClick={onCancel} className="flex-1 py-4 bg-slate-100 rounded-2xl font-bold text-slate-600 hover:bg-slate-200">Nein</button>
                        <button onClick={onConfirm} className="flex-1 py-4 bg-red-500 rounded-2xl font-bold text-white transition-all active:scale-95 shadow-lg shadow-red-100 hover:bg-red-600">Löschen</button>
                    </div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
